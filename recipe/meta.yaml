{% set name = "pytensor-distributions" %}
{% set version = "0.1.3" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_')}}-{{ version }}.tar.gz
  sha256: 7884d0fa35ebe2fa16a0f1f7be851aab831d181c192af613083f7b3501b630f3

build:
  number: 0
  skip: true  # [py<311]
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python
    - pip
    - flit-core >=3.4,<4
  run:
    - python
    - numpy >=2.0
    - pytensor >=2.32.0

test:
  imports:
    - pytensor_distributions
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/pymc-devs/pytensor-distributions
  summary: PyTensor powered distributions.
  description: |
    Probability distributions implemented on top of PyTensor for use in PyMC and
    related libraries.
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  doc_url: https://pytensor-distributions.readthedocs.io/
  dev_url: https://github.com/pymc-devs/pytensor-distributions

extra:
  recipe-maintainers:
    - aloctavodia
    - ricardov94
    - maresb
